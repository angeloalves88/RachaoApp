<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sem conexão · RachãoApp</title>
    <style>
      :root {
        --primary: #e8530a;
        --bg: #0f1b2d;
        --fg: #e8edf3;
        --muted: #7a8fa6;
      }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: var(--primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 38px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 8px;
      }
      p {
        color: var(--muted);
        max-width: 360px;
        margin: 0 0 24px;
        line-height: 1.5;
      }
      button {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 20px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">R</div>
      <h1>Você está sem conexão</h1>
      <p>
        Não conseguimos carregar esta página agora. Os eventos do registro ao vivo
        continuam sendo salvos localmente e serão enviados quando você voltar online.
      </p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
