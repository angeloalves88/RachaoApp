# =============================================================================
# RachaoApp — Supabase self-hosted (Docker Swarm + Traefik)
#
# Deploy (na VPS, com o repo em /opt/rachaoapp ou similar):
#   cd /opt/rachaoapp/infra/docker
#   cp .env.production.example .env   # edite segredos e dominios
#   docker stack deploy -c docker-compose-swarm-supabase.yml rachao-supabase --env-file .env
#
# Rede overlay `rachao-backend` deve existir ou sera criada neste stack.
# Traefik: servico `kong` na rede externa TRAEFIK_NETWORK (ex.: PDRCOREBOT).
# =============================================================================

services:
  db:
    image: supabase/postgres:15.6.1.139
    networks:
      rachao-backend:
        aliases:
          - db
          - rachao-postgres
    volumes:
      - rachao_postgres_data:/var/lib/postgresql/data
      - ../supabase/volumes/db/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'supabase_admin', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  auth:
    image: supabase/gotrue:v2.167.0
    networks:
      - rachao-backend
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_SIGNUP:-false}
      GOTRUE_SMS_AUTOCONFIRM: ${ENABLE_PHONE_AUTOCONFIRM:-false}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_PROVIDER:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  rest:
    image: postgrest/postgrest:v12.2.3
    networks:
      - rachao-backend
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: postgrest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  realtime:
    image: supabase/realtime:v2.34.7
    networks:
      - rachao-backend
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: '10000'
      APP_NAME: realtime
      SEED_SELF_HOST: 'true'
      RUN_JANITOR: 'true'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    networks:
      - rachao-backend
    environment:
      IMGPROXY_BIND: ':5001'
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: 'true'
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - rachao_storage_data:/var/lib/storage:z
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  storage:
    image: supabase/storage-api:v1.14.5
    networks:
      - rachao-backend
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: 'true'
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - rachao_storage_data:/var/lib/storage:z
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  meta:
    image: supabase/postgres-meta:v0.84.2
    networks:
      - rachao-backend
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  studio:
    image: supabase/studio:20241202-71e5240
    networks:
      - rachao-backend
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-RachaoApp}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-RachaoApp}
      OPENAI_API_KEY: ''
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      # Sem servico analytics no stack; logs desabilitados (igual dev compose)
      LOGFLARE_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_ENABLE_LOGS: 'false'
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  kong:
    image: kong:2.8.1
    networks:
      - rachao-backend
      - __TRAEFIK_NETWORK__
    entrypoint: ['bash', '/home/kong/entrypoint.sh']
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ../supabase/volumes/api/kong.yml:/home/kong/temp.yml:ro
      - ../supabase/volumes/api/entrypoint.sh:/home/kong/entrypoint.sh:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=__TRAEFIK_NETWORK__
        - traefik.http.routers.rachao-supabase.rule=Host(`${SUPABASE_DOMAIN}`)
        - traefik.http.routers.rachao-supabase.priority=1
        - traefik.http.routers.rachao-supabase.entrypoints=websecure
        - traefik.http.routers.rachao-supabase.tls=true
        - traefik.http.routers.rachao-supabase.tls.certresolver=letsencryptresolver
        - traefik.http.services.rachao-supabase.loadbalancer.server.port=8000
        - traefik.http.routers.rachao-supabase.middlewares=rachao-sb-headers
        - traefik.http.routers.rachao-supabase-http.rule=Host(`${SUPABASE_DOMAIN}`)
        - traefik.http.routers.rachao-supabase-http.entrypoints=web
        - traefik.http.routers.rachao-supabase-http.middlewares=rachao-sb-redirect-https
        - traefik.http.middlewares.rachao-sb-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.rachao-sb-redirect-https.redirectscheme.permanent=true
        - traefik.http.middlewares.rachao-sb-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.rachao-sb-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.rachao-sb-headers.headers.forceSTSHeader=true
        - traefik.http.middlewares.rachao-sb-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.rachao-sb-headers.headers.browserXssFilter=true
        - traefik.http.middlewares.rachao-sb-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      resources:
        limits:
          memory: 512M

networks:
  rachao-backend:
    external: true
  __TRAEFIK_NETWORK__:
    external: true

volumes:
  rachao_postgres_data:
  rachao_storage_data:
