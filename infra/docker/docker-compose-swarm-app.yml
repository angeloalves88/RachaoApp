version: '3.8'

# =============================================================================
# RachaoApp — Web (Next.js) + API (Fastify) — Docker Swarm + Traefik
#
# Pre-requisitos:
#   - Stack rachao-supabase ja no ar (rede rachao-backend)
#   - Imagens buildadas (./build-images.sh) ou registry configurado
#   - Job de migrate executado ao menos uma vez (./run-migrate.sh)
#
# Deploy:
#   docker stack deploy -c docker-compose-swarm-app.yml rachao-app --env-file .env
# =============================================================================

services:
  rachao-api:
    image: ${CR_IMAGE_API:-rachao-api:latest}
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      TZ: America/Sao_Paulo

      CORS_ORIGIN: https://${WEB_DOMAIN}
      WEB_URL: https://${WEB_DOMAIN}

      DATABASE_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?schema=public

      SUPABASE_URL: https://${SUPABASE_DOMAIN}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}

      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}

      ENABLE_NOTIFICATION_JOBS: ${ENABLE_NOTIFICATION_JOBS:-true}
      NOTIFICATION_JOBS_INTERVAL_MIN: ${NOTIFICATION_JOBS_INTERVAL_MIN:-30}

    networks:
      - rachao-backend
      - traefik-public

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3333/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK:-PDRCOREBOT}

        - traefik.http.routers.rachao-api.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.rachao-api.priority=1
        - traefik.http.routers.rachao-api.entrypoints=websecure
        - traefik.http.routers.rachao-api.tls=true
        - traefik.http.routers.rachao-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.rachao-api.loadbalancer.server.port=3333
        - traefik.http.middlewares.rachao-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.rachao-redirect-https.redirectscheme.permanent=true
        - traefik.http.middlewares.rachao-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.rachao-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.rachao-headers.headers.forceSTSHeader=true
        - traefik.http.middlewares.rachao-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.rachao-headers.headers.browserXssFilter=true
        - traefik.http.middlewares.rachao-headers.headers.referrerPolicy=strict-origin-when-cross-origin
        - traefik.http.routers.rachao-api.middlewares=rachao-headers,rachao-ratelimit-api

        - traefik.http.routers.rachao-api-http.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.rachao-api-http.entrypoints=web
        - traefik.http.routers.rachao-api-http.middlewares=rachao-redirect-https

        - traefik.http.routers.rachao-api-health.rule=Host(`${API_DOMAIN}`) && Path(`/health`)
        - traefik.http.routers.rachao-api-health.priority=10
        - traefik.http.routers.rachao-api-health.entrypoints=websecure
        - traefik.http.routers.rachao-api-health.tls=true
        - traefik.http.routers.rachao-api-health.tls.certresolver=letsencryptresolver
        - traefik.http.routers.rachao-api-health.service=rachao-api
        - traefik.http.routers.rachao-api-health.middlewares=rachao-headers,rachao-ratelimit-health

        - traefik.http.middlewares.rachao-ratelimit-api.ratelimit.average=50
        - traefik.http.middlewares.rachao-ratelimit-api.ratelimit.burst=100
        - traefik.http.middlewares.rachao-ratelimit-health.ratelimit.average=3
        - traefik.http.middlewares.rachao-ratelimit-health.ratelimit.burst=10

      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '5'

  rachao-web:
    image: ${CR_IMAGE_WEB:-rachao-web:latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      TZ: America/Sao_Paulo
    networks:
      - traefik-public
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK:-PDRCOREBOT}

        - traefik.http.routers.rachao-web.rule=Host(`${WEB_DOMAIN}`)
        - traefik.http.routers.rachao-web.priority=1
        - traefik.http.routers.rachao-web.entrypoints=websecure
        - traefik.http.routers.rachao-web.tls=true
        - traefik.http.routers.rachao-web.tls.certresolver=letsencryptresolver
        - traefik.http.services.rachao-web.loadbalancer.server.port=3000
        - traefik.http.routers.rachao-web.middlewares=rachao-headers,rachao-ratelimit-web

        - traefik.http.routers.rachao-web-http.rule=Host(`${WEB_DOMAIN}`)
        - traefik.http.routers.rachao-web-http.entrypoints=web
        - traefik.http.routers.rachao-web-http.middlewares=rachao-redirect-https

        - traefik.http.middlewares.rachao-ratelimit-web.ratelimit.average=100
        - traefik.http.middlewares.rachao-ratelimit-web.ratelimit.burst=50

      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '5'

networks:
  rachao-backend:
    external: true
    name: rachao-backend
  traefik-public:
    external: true
    name: ${TRAEFIK_NETWORK:-PDRCOREBOT}
